[toolchain]
package_manager = "npm"

[features]
resolution = true
skip-lint = false

# v1.0 program ID (this repo). v0.1 ID `3GtvfooGkkXDjeAaMSAZBzzUbH7vYSFKhgKJewbi4iWD`
# remains deployed on devnet for the museum reference; see docs/v1-design.md §9.
[programs.localnet]
adler_escrow = "BArnn6qEM45LMxntW2eBKc5icsZGGqaLiDFCSTFx1uZr"

[programs.devnet]
adler_escrow = "BArnn6qEM45LMxntW2eBKc5icsZGGqaLiDFCSTFx1uZr"

[registry]
url = "https://api.apr.dev"

[provider]
# Tests run on a fresh local validator (`anchor test` starts solana-test-validator
# automatically when cluster = localnet — no faucet rate limits). Devnet deploys
# go through `scripts/deploy-devnet.sh` which passes `--provider.cluster devnet`.
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
# Custom runner manages the validator + program preload itself — Anchor 0.31's
# auto-deploy on `anchor test` was racing the test boot on this toolchain.
# See scripts/run-tests.sh for the rationale.
test = "scripts/run-tests.sh"
